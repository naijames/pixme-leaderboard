<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#FC4C02">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pixme Run">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixme Run Club Leaderboard</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;padding:1.5rem}
  .wrap{max-width:900px;margin:0 auto}
  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.75rem;gap:1rem;flex-wrap:wrap}
  h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
  .badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500;display:inline-flex;align-items:center;gap:5px}
  .badge.live{background:#1a3a1a;color:#5cb85c;border:1px solid #2d5a2d}
  .badge.archive{background:#1a2a3a;color:#4a8eff;border:1px solid #2d4a6a}
  .badge.wait{background:#2a2a2a;color:#888;border:1px solid #333}
  .badge.err{background:#3a1a1a;color:#e05c5c;border:1px solid #5a2d2d}
  .dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
  .meta{font-size:12px;color:#666;margin-top:4px}
  .period{font-size:12px;color:#FC4C02;margin-top:3px;font-weight:500}
  .right-col{display:flex;flex-direction:row;align-items:center;gap:8px;flex-shrink:0}
  .btn{padding:8px 14px;border-radius:8px;border:1px solid #333;background:#1c1c1c;color:#f0f0f0;font-size:13px;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:6px}
  .btn:hover{background:#2a2a2a}
  .month-select{padding:7px 12px;border-radius:8px;border:1px solid #333;background:#1c1c1c;color:#f0f0f0;font-size:13px;cursor:pointer;outline:none}
  .month-select:focus{border-color:#555}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.75rem}
  .stat{background:#1a1a1a;border:1px solid #252525;border-radius:12px;padding:14px 16px;text-align:center}
  .stat .lbl{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  .stat .val{font-size:26px;font-weight:600;color:#fff}
  .stat .sub{font-size:11px;color:#555;margin-top:3px}
  .tbl-wrap{background:#1a1a1a;border:1px solid #252525;border-radius:12px;overflow:hidden;max-height:70vh;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none}.tbl-wrap::-webkit-scrollbar{display:none}
  table{width:100%;border-collapse:collapse}
  th{padding:10px 14px;font-size:11px;font-weight:500;color:#555;text-align:left;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #252525;position:sticky;top:0;background:#1a1a1a;z-index:1}
  th.r{text-align:right}
  td{padding:12px 14px;border-bottom:1px solid #1f1f1f;font-size:13px;vertical-align:middle}
  td.r{text-align:right;font-variant-numeric:tabular-nums}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#1f1f1f}
  .medal{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .m1{background:#b87c0a;color:#fff}
  .m2{background:#6a6a6a;color:#fff}
  .m3{background:#7a4a2a;color:#fff}
  .mn{background:#252525;color:#666}
  .nm{font-weight:500;color:#f0f0f0}
  .sub-txt{font-size:11px;color:#555;margin-top:2px}
  .dist{background:#1a2e4a;color:#fff;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:400;white-space:nowrap}
  .empty{padding:3.5rem;text-align:center;color:#444;font-size:14px}
  .footer{text-align:center;font-size:11px;color:#444;margin-top:1.25rem}
  .spinning{display:inline-block;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @media(max-width:580px){body{padding:1rem}.stat .val{font-size:20px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>🏆 Pixme Run Club
        <span class="badge wait" id="badge"><span class="dot"></span> กำลังโหลด</span>
      </h1>
      <p class="meta" id="meta">กำลังเชื่อมต่อ Strava...</p>
    </div>
    <div class="right-col">
      <select class="month-select" id="month-select" onchange="onMonthChange()" style="display:none">
      </select>
      <button class="btn" id="refresh-btn" onclick="load()" style="display:none">
        <span id="ref-icon">↻</span> รีเฟรช
      </button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><div class="lbl">ระยะทางรวม</div><div class="val" id="s-dist">—</div><div class="sub">กิโลเมตร</div></div>
    <div class="stat"><div class="lbl">นักกีฬา</div><div class="val" id="s-ath">—</div><div class="sub">คนที่ active</div></div>
    <div class="stat"><div class="lbl">กิจกรรม</div><div class="val" id="s-act">—</div><div class="sub">รายการ</div></div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead><tr>
        <th style="width:42px">#</th>
        <th style="width:1%;white-space:nowrap">นักกีฬา</th>
        <th class="r">ระยะทางสะสม</th>
        <th style="text-align:center">กิจกรรม</th>
      </tr></thead>
      <tbody id="tbody">
        <tr><td colspan="4"><div class="empty"><span class="spinning">↻</span> กำลังโหลด...</div></td></tr>
      </tbody>
    </table>
  </div>
  <p class="footer" id="footer"></p>
</div>

<script>
const PROXY = 'https://script.google.com/macros/s/AKfycbxxQNBbf1T5LXD_JdZjRes87WJvEdRwbvs0e1k0s0Aa5SLpHUlpJjrMK9kRHVKMJ8KU/exec';
const MONTH_TH = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
let timer, countdown = 0, selectedMonth = '';

function formatMonth(m) {
  const parts = m.split('-');
  return MONTH_TH[parseInt(parts[1])-1] + ' ' + (parseInt(parts[0])+543);
}

function setBadge(type, text) {
  const b = document.getElementById('badge');
  b.className = 'badge ' + type;
  b.innerHTML = '<span class="dot"></span> ' + text;
}

function getIntervalSec() {
  const h = (new Date().getUTCHours() + 7) % 24;
  if (h >= 0  && h < 4)  return 0;
  if (h >= 4  && h < 5)  return 300;
  if (h >= 5  && h < 10) return 60;
  if (h >= 10 && h < 16) return 900;
  if (h >= 16 && h < 21) return 60;
  return 900;
}

function onMonthChange() {
  selectedMonth = document.getElementById('month-select').value;
  load();
}

function load() {
  document.getElementById('ref-icon').classList.add('spinning');
  setBadge('wait', 'กำลังโหลด');
  clearInterval(timer);

  const cbName = 'cb_' + Date.now();
  const timeout = setTimeout(function() {
    delete window[cbName];
    setBadge('err', 'Error');
    document.getElementById('meta').textContent = 'หมดเวลา — ลองกดรีเฟรชใหม่';
    document.getElementById('ref-icon').classList.remove('spinning');
  }, 15000);

  window[cbName] = function(res) {
    clearTimeout(timeout);
    delete window[cbName];
    try {
      // Update month dropdown
      const sel = document.getElementById('month-select');
      sel.innerHTML = '';
      (res.availableMonths || []).forEach(function(m) {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = formatMonth(m);
        if (m === res.month) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.style.display = 'block';
      document.getElementById('refresh-btn').style.display = 'flex';

      // Update meta: "update: 1-13 May 26 hh:mm"
      const parts = res.month.split('-');
      const y = parseInt(parts[0]), mo = parseInt(parts[1]);
      const now = new Date();
      const lastDay = res.isCurrent ? now.getDate() : new Date(y, mo, 0).getDate();
      const MONTH_EN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      const dd = String(now.getDate()).padStart(2,'0');
      const yy = String(y).slice(-2);
      const dl2 = daysLeft();
      const dlStr = dl2 === 0 ? 'last day! 🔥' : dl2 + ' days left';
      document.getElementById('meta').innerHTML = 'update: ' + dd + ' ' + MONTH_EN[mo-1] + ' ' + yy + ' / ' + hh + ':' + mm + ' / <span style="color:#FC4C02;font-weight:500">' + dlStr + '</span>';

      render(res.data, res.isCurrent);
      setBadge(res.isCurrent ? 'live' : 'archive', res.isCurrent ? 'Live' : formatMonth(res.month));

      if (res.isCurrent) startCountdown();
      else document.getElementById('footer').textContent = 'ข้อมูลสิ้นเดือน ' + formatMonth(res.month) + ' • Pixme Run Club';
    } catch(e) {
      setBadge('err', 'Error');
      document.getElementById('meta').textContent = 'ข้อมูลผิดพลาด: ' + e.message;
    }
    document.getElementById('ref-icon').classList.remove('spinning');
  };

  const s = document.createElement('script');
  const url = PROXY + '?callback=' + cbName + (selectedMonth ? '&month=' + selectedMonth : '');
  s.src = url;
  s.onerror = function() {
    clearTimeout(timeout);
    delete window[cbName];
    setBadge('err', 'Error');
    document.getElementById('meta').textContent = 'โหลดไม่ได้ — ตรวจสอบ Apps Script';
    document.getElementById('ref-icon').classList.remove('spinning');
  };
  document.head.appendChild(s);
}

function render(athletes, isCurrent) {
  const totalDist = athletes.reduce(function(s,a){return s+a.distance;},0);
  const totalAct  = athletes.reduce(function(s,a){return s+a.activities;},0);
  document.getElementById('s-dist').textContent = totalDist.toFixed(1);
  document.getElementById('s-ath').textContent  = athletes.length;
  document.getElementById('s-act').textContent  = totalAct;

  const tbody = document.getElementById('tbody');
  if (!athletes.length) {
    tbody.innerHTML = '<tr><td colspan="4"><div class="empty">ไม่มีกิจกรรมเดือนนี้ 😴</div></td></tr>';
    return;
  }
  tbody.innerHTML = athletes.map(function(a, i) {
    const r = i+1;
    const mc = r===1?'m1':r===2?'m2':r===3?'m3':'mn';
    const emoji = a.topType==='Run'?'🏃':a.topType==='Ride'?'🚴':a.topType==='Walk'?'🚶':a.topType==='Swim'?'🏊':'⚡';
    return '<tr>' +
      '<td><div class="medal '+mc+'">'+r+'</div></td>' +
      '<td style="white-space:nowrap"><div class="nm">'+a.name+'</div><div class="sub-txt">'+emoji+' '+(a.topType||'Activity')+'</div></td>' +
      '<td class="r"><span class="dist">'+a.distance.toFixed(1)+' km</span></td>' +
      '<td style="text-align:center">'+a.activities+'</td>' +
      '</tr>';
  }).join('');
}

function daysLeft() {
  const now = new Date();
  const lastDay = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  return lastDay - now.getDate();
}

function startCountdown() {
  clearInterval(timer);
  const sec = getIntervalSec();
  const dl = daysLeft();
  const dlText = dl === 0 ? 'วันสุดท้ายของเดือน! 🔥' : dl + ' วันจนจบเดือน';
  if (sec === 0) {
    document.getElementById('footer').textContent = dlText + ' • หยุดอัปเดตช่วงนี้';
    return;
  }
  countdown = sec;
  timer = setInterval(function() {
    countdown--;
    const m = Math.floor(countdown/60), s = String(countdown%60).padStart(2,'0');
    const label = sec===60?'1 min':sec===300?'5 min':'15 min';
    document.getElementById('footer').textContent = dlText + ' • next update in ' + m + ':' + s;
    if (countdown <= 0) load();
  }, 1000);
}

load();
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
